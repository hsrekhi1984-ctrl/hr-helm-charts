service:
  name: hr-payroll-service
  port: 80

image:
  repository: ghcr.io/company/hr-payroll-service
  tag: "1.0.0"

replicaCount: 2
containerPort: 8080

ingress:
  enabled: true
  className: nginx
  host: payroll.hr.example.com
  path: /

serviceMonitor:
  enabled: true

livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: http

readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: http

env:
  - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
    value: "health"
  - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
    value: "true"

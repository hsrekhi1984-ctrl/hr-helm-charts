service:
  name: hr-employee-service
  port: 80

image:
  repository: ghcr.io/company/hr-employee-service
  tag: "1.0.0"

replicaCount: 2
containerPort: 8080

ingress:
  enabled: true
  className: nginx
  host: employee.hr.example.com
  path: /

serviceMonitor:
  enabled: true

env:
  - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
    value: "health"
  - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
    value: "true"

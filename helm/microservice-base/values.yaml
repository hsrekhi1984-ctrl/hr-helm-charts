nameOverride: ""
fullnameOverride: ""

service:
  name: hr-microservice
  type: ClusterIP
  port: 80
  targetPort: ""

image:
  repository: ghcr.io/company/hr-service
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 2
containerPort: 8080

podAnnotations: {}
podLabels:
  azure.workload.identity/use: "true"

serviceAccount:
  create: true
  automount: true
  annotations: 
    azure.workload.identity/client-id: ed0d270a-afd4-431f-87d6-9f451c5d1345
  name: "hr-payroll-sa"

podSecurityContext: {}
securityContext: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

env: []
envFrom: []

secret:
  enabled: false
  type: Opaque
  annotations: {}
  labels: {}
  stringData: {}
  data: {}

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  path: /
  pathType: Prefix
  tls: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

networkPolicy:
  enabled: false
  ingress: []
  egress: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  port: http
